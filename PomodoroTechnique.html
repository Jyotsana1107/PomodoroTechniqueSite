<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Pomodoro Technique</title>



        <!--CSS Styling-->
        <style>
            body {
                background-color: #da7a7a;
                margin: 0;
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .container {
                align-items: center;
                height: 460px;
                width: 220px;
                display: flex;
                flex-direction: column;
                justify-content: center;
                background-color: #292222;
                padding: 20px;
            }

            #upper-part {
                background-color: #f0f0f0;
                padding: 30px 50px 30px 50px;
                border: 10px solid #6552cf;
                margin-bottom: 35px;
                font-size: 40px;
            }

            #lower-part {  
                background-color: #2e2d2d;
                padding: 25px 15px;
            }

            #session-part {
                color: #f0f0f0;
                align-items: center;
                text-align: center;
                margin-bottom: 20px;
                font-size: 20px;
            }

            #setTimePart {
                display: flex;
                flex-direction: row;
                justify-content: center;
                flex: 1;
                margin-bottom: 20px;
                margin-left: 15px;
                gap: 25px;
            }

            #sessionLabel {
                color: #f0f0f0;
                display: flex;
                flex-direction: column;
                flex: 2;
                text-align: center;
                font-size: 20px;
            }

            #sessionTime {
                color: #639aec;
                text-align: center;
                margin-bottom: 10px;
                margin-top: 10px;
                font-size: 18px;
            }

            #sessionButtons {
                display: flex;
                flex-direction: row;
                flex: 1;
                justify-content: center;
                gap: 5px;
            }

             #breakLabel {
                color: #f0f0f0;
                margin-right: 10px;
                display: flex;
                flex-direction: column;
                flex: 2;
                text-align: center;
                margin-bottom: 10px;
                font-size: 20px;
            }

            #breakTime {
                color: #fc0101;
                text-align: center;
                margin-bottom: 10px;
                margin-top: 10px;
                font-size: 18px;
            }

            #breakButtons {
                display: flex;
                flex-direction: row;
                flex: 1;
                justify-content: center;
                gap: 5px;
            }

            #decreaseSession,
            #increaseSession,
            #decreaseBreak,
            #increaseBreak,
            #startButton,
            #resetButton {
                color: #f0f0f0;
                background-color: #171718;
                border-radius: 5px;
                border: none;
                cursor: pointer;
            }

            #decreaseSession,
            #increaseSession,
            #decreaseBreak,
            #increaseBreak {
                width: 25px;
                height: 22px;
                font-size: 15px;
            }

            #buttons {
                display: flex;
                flex-direction: row;
                justify-content: center;
                gap: 30px;
            }

            #startButton,
            #resetButton {
                padding: 10px;
                font-size: 15px;
            }
        </style>
    </head>





    <!--HTML Base-->
    <body>

        <!--container for the entire clock-->
        <div class="container">
            
            <!--upper part for timer-->
            <div id="upper-part">25:00</div>
            
            <!--lower part for session and break time settings-->
            <div id="lower-part">
                
                <!--session heading-->
                <div id="session-part">Session Part</div>
                
                <!--to set time-->
                <div id="setTimePart">
                    
                    <!--session time-->
                    <div id="sessionLabel">Session Time
                        
                        <!--start time-->
                        <span id="sessionTime">25:00</span>
                        
                        <!--start buttons-->
                        <div id="sessionButtons">
                            <button id="decreaseSession">-</button>
                            <button id="increaseSession">+</button>
                        </div>
                    </div>

                    <!--break time-->
                    <div id="breakLabel"> Break<br>Time
                        
                        <!--break time-->
                        <span id="breakTime">05:00</span>
                        
                        <!--break buttons-->
                        <div id="breakButtons">
                            <button id="decreaseBreak">-</button>
                            <button id="increaseBreak">+</button>
                        </div>
                    </div>
                </div>



                <!--Buttons-->
                <div id="buttons">
                    
                    <!--Button to Pause-->
                    <button id="startButton">Start</button>
                    
                    <!--Button to Reset-->
                    <button id="resetButton">Reset</button>
                </div>
            </div>
        </div>






        <!--JavaScript Functionality-->
        <script>
            const timer = document.getElementById("upper-part");
            const sessionTime = document.getElementById("sessionTime");
            const breakTime = document.getElementById("breakTime");
            const decreaseSession = document.getElementById("decreaseSession");
            const increaseSession = document.getElementById("increaseSession");
            const decreaseBreak = document.getElementById("decreaseBreak");
            const increaseBreak = document.getElementById("increaseBreak");
            const startButton = document.getElementById("startButton");
            const resetButton = document.getElementById("resetButton");

            let interval = null;
            let isRunning = false;
            let isSession = true;



            //main part of code functionality
            function startTimer(timer){

                //to convert time to int to calculate
                let time = timer.innerText.split(":");
                let minutes = parseInt(time[0]);
                let seconds = parseInt(time[1]);


                //logic to run timer backwards
                if (minutes == 0 && seconds == 0) {
                    if (isSession) {
                        // Start Break
                        isSession = false;
                        timer.innerText = breakTime.innerText;
                    }
                    else {
                        // Start Session
                        isSession = true;
                        timer.innerText = sessionTime.innerText;
                    }
                    return;
                }

                //when seconds will get 00, seconds will get to 59 and minute will be decreemented by 1
                if (seconds == 0) {
                    seconds = 59;
                    minutes--;
                }
                else{
                    seconds--;
                } 
                

                // to show timer on screen
                let updatedTime = [
                    minutes.toString().padStart(2, '0'),
                    seconds.toString().padStart(2, '0')
                ].join(":");
                
                timer.innerText = updatedTime;
            }

        


            //Session Time Increase or Decrease
            let sessionArray;
            let currentSessionTime;
            let afterDecrease;
            let newSessionTime;
            let afterAdd;

            //logic for decrease of Session Time
            decreaseSession.addEventListener("click", function(){
                const sessionTimer = document.getElementById("sessionTime");
                sessionArray = sessionTimer.innerText.split(":")
                currentSessionTime = parseInt(sessionArray[0]);
                if (currentSessionTime == 0 || currentSessionTime < 0){
                    alert("Session Time can't be 0 or less than 0");
                }
                else{
                    afterDecrease = currentSessionTime - 5;
                    newSessionTime = [
                        afterDecrease.toString().padStart(2, "0"),
                        "00"
                    ].join(":");
                    sessionTimer.innerText = newSessionTime;
                }
            });


            //logic for decrease of Session Time
            increaseSession.addEventListener("click", function(){
                const sessionTimer = document.getElementById("sessionTime");
                sessionArray = sessionTimer.innerText.split(":")
                currentSessionTime = parseInt(sessionArray[0]);
                if (currentSessionTime >= 180){
                    alert("Session Time can't be more than 180 mins");
                }
                else{
                    afterAdd = currentSessionTime + 5;
                    newSessionTime = [
                        afterAdd.toString().padStart(2, "0"),
                        "00"
                    ].join(":");
                    sessionTimer.innerText = newSessionTime;
                }
            });



            //Break Time Increase or Decrease
            let breakArray;
            let currentBreakTime;
            let newBreakTime;
            let afterBreakDecrease;
            let afterBreakIncrease;

            //logic for decrease of Break Time
            decreaseBreak.addEventListener("click", function(){
                const breakTimer = document.getElementById("breakTime");
                breakArray = breakTimer.innerText.split(":")
                currentBreakTime = parseInt(breakArray[0]);
                if (currentBreakTime == 0 || currentBreakTime < 0){
                    alert("Break Time can't be 0 or less than 0");
                }
                else{
                    afterBreakDecrease = currentBreakTime - 5;
                    newBreakTime = [
                        afterBreakDecrease.toString().padStart(2, "0"),
                        "00"
                    ].join(":");
                    breakTimer.innerText = newBreakTime;
                }
            });


            //logic for increase of Break Time
            increaseBreak.addEventListener("click", function(){
                const breakTimer = document.getElementById("breakTime");
                breakArray = breakTimer.innerText.split(":")
                currentBreakTime = parseInt(breakArray[0]);
                if (currentBreakTime >= 90){
                    alert("Break Time can't be more than 90 mins");
                }
                else{
                    afterBreakIncrease = currentBreakTime + 5;
                    newBreakTime = [
                        afterBreakIncrease.toString().padStart(2, "0"),
                        "00"
                    ].join(":");
                    breakTimer.innerText = newBreakTime;
                }
            });





            //startbutton
            let newTime;
            startButton.addEventListener("click", function(){
                let timer = document.getElementById("upper-part");
                if (timer){
                    if(startButton.innerText === "Start"){
                        let newTime = document.getElementById("sessionTime");
                        timer.innerText = newTime.innerText;
                        interval = setInterval(() => startTimer(timer),1000);
                        startButton.innerText = "Pause";
                    }
                    else if (startButton.innerText === "Pause"){
                        clearInterval(interval);
                        interval = null;
                        startButton.innerText = "Resume";
                    }
                    else{
                        interval = setInterval(() => startTimer(timer), 1000);
                        startButton.innerText = "Pause";
                    }
                }
                else{
                    alert("!!!Timer Alert!!!")
                }
            });




            //Reset button
            resetButton.addEventListener("click", function(){
                let screen = document.getElementById("upper-part");
                let newTime = document.getElementById("sessionTime");
                screen.innerText = newTime.innerText;
                clearInterval(interval);
                interval = null;
                isSession = true;
                startButton.innerText = "Start";
            })



        </script>
    </body>
</html>
